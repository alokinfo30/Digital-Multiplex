# render.yaml
# This file defines the infrastructure for the Digital Multiplex application on Render.
# It includes a web service for the Flask app, a private service for LibreTranslate,
# and a PostgreSQL database, configured for a production environment.

previews: true # Enable Pull Request Previews for automated testing of new changes.

services:
  # 1. LibreTranslate Server (Private Docker Service)
  - type: pserv
    name: libretranslate-server
    region: oregon # Or your preferred region: oregon, frankfurt, ohio, singapore
    env: docker
    dockerfilePath: ./Dockerfile.libretranslate
    autoDeploy: true
    healthCheckInitialDelaySeconds: 300 # Give 5 mins for models to download on first start
    plan: standard # Provides dedicated CPU/Memory for translation tasks
    # Create a persistent disk to store downloaded language models across deploys
    disks:
      - name: lt-models
        mountPath: /home/libretranslate/.local
        sizeGB: 2

  # 2. Flask Web Application (Web Service)
  - type: web
    name: digital-multiplex
    region: oregon # Keep services in the same region for low latency
    env: python
    autoDeploy: true
    plan: starter # Upgrade to 'Standard' for more CPU/Memory as traffic grows
    # Add custom domains here after registering them
    # domains:
    #   - www.your-domain.com
    buildCommand: "./build.sh"
    startCommand: "gunicorn --workers 3 --timeout 120 --access-logfile - --error-logfile - --bind 0.0.0.0:$PORT run:app"
    healthCheck:
      path: /health
      initialDelaySeconds: 30 # Give the app time to start before the first check
      headers:
        - key: X-Render-Health-Check-Key
          fromValue: RENDER_HEALTH_CHECK_KEY # Use a generated secret value
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      # For better secret management, create an Environment Group in Render
      # and link it here. This is the recommended way to handle secrets.
      - fromGroup: digital-multiplex-secrets
      - key: WEB_CONCURRENCY
        value: 3 # Corresponds to the number of Gunicorn workers
      - key: DATABASE_URL
        fromDatabase:
          name: multiplex-db
          property: connectionString
      - key: LIBRETRANSLATE_URL
        fromService:
          type: pserv
          name: libretranslate-server
          property: url
      - key: RENDER_HEALTH_CHECK_KEY
        generateValue: true # This value will be generated by Render and used for health checks

databases:
  # 3. PostgreSQL Database
  - name: multiplex-db
    region: oregon # Keep the database close to the web service
    databaseName: multiplex
    plan: free # Upgrade to a paid plan for production apps to enable backups
    user: multiplex_user